{% load static %}

<div class="modal-dialog modal-dialog-centered modal-md">
  <div class="modal-content">
    <div class="modal-header bg-light p-3">
      <h5 class="modal-title">
        Crear categoría
      </h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>

    <form method="POST" action="{% url 'vexora:create_category' %}">
      {% csrf_token %}
      <div class="modal-body">
        
        <div class="mb-3">
          <label for="{{ form.name.id_for_label }}" class="form-label">
            Nombre de la categoría <span class="text-danger">*</span>
          </label>
          {{ form.name }}
          {% if form.name.errors %}
            <div class="text-danger small mt-1">{{ form.name.errors }}</div>
          {% endif %}
        </div>

        <div class="mb-3">
          <label for="{{ form.description.id_for_label }}" class="form-label">
            Descripción
          </label>
          {{ form.description }}
          {% if form.description.errors %}
            <div class="text-danger small mt-1">{{ form.description.errors }}</div>
          {% endif %}
        </div>

        <input type="hidden" name="created_at" value="{% now 'Y-m-d H:i:s' %}">

      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-light" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-sm btn-success">
          <i class="ri-save-line me-1 align-bottom"></i> Guardar
        </button>
      </div>
    </form>
  </div>
</div>

<script>
  $(document).ready(function() {
    // Inicializar Select2 para el campo de compañía
    if (typeof $.fn.select2 !== 'undefined') {
      $('#id_company').select2({
        theme: 'bootstrap-5',
        dropdownParent: $('#ModalOptions'),
        width: '100%',
        placeholder: 'Seleccione una compañía',
        allowClear: true
      });
    }

    var companySelect = $('#id_company');
    if (companySelect.length) {
      var options = companySelect.find('option');
      if (options.length === 2) {
        companySelect.val(options.eq(1).val()).trigger('change');
        // Opcional: deshabilitar el select si solo hay una opción
        // companySelect.prop('disabled', true);
        // companySelect.parent().append('<div class="form-text text-muted">Compañía asignada automáticamente</div>');
      }
    }
  });
</script>
