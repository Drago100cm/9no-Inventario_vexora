{% load static %}

<div class="modal-dialog modal-dialog-centered modal-md">
  <div class="modal-content">
    <div class="modal-header bg-light p-3">
      <h5 class="modal-title">
        Editar proveedor
      </h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>

    <form method="POST" action="{% url 'vexora:supplier_edit' supplier.id %}">
      {% csrf_token %}
      <div class="modal-body">
        
        <div class="mb-3">
          <label for="{{ form.name.id_for_label }}" class="form-label">
            Supplier Name <span class="text-danger">*</span>
          </label>
          {{ form.name }}
          {% if form.name.errors %}
            <div class="text-danger small mt-1">{{ form.name.errors }}</div>
          {% endif %}
        </div>

        <div class="mb-3">
          <label for="{{ form.address.id_for_label }}" class="form-label">
            Address
          </label>
          {{ form.address }}
          {% if form.address.errors %}
            <div class="text-danger small mt-1">{{ form.address.errors }}</div>
          {% endif %}
        </div>

        <input type="hidden" name="company" value="{{ request.user.company.id }}">

      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-light" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-sm btn-success">
          <i class="ri-save-line me-1 align-bottom"></i> Actualizar
        </button>
      </div>
    </form>
  </div>
</div>
