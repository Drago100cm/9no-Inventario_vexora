    <!DOCTYPE html>
    <html>
    <head>
        <title>Confirm Delete</title>
        <style>
            body { font-family: 'Segoe UI', Arial; background: linear-gradient(135deg, #7c3aed 0%, hsl(264, 67%, 35%) 100%); padding: 20px; text-align: center; min-height: 100vh; }
            .container { max-width: 500px; margin: 50px auto; background: #f3e8ff; padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
            h1 { color: #ff0019; margin-bottom: 20px; }
            p { color: #2600ff; font-size: 18px; margin-bottom: 20px; }
            button { padding: 10px 20px; margin: 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: all 0.3s; }
            .btn-eliminar { background: #ff0019; color: white; }
            .btn-eliminar:hover { background: #c82333; transform: translateY(-2px); }
            .btn-cancelar { background: #6c757d; color: white; text-decoration: none; display: inline-block; padding: 10px 20px; border-radius: 5px; transition: all 0.3s; }
            .btn-cancelar:hover { background: #5a6268; transform: translateY(-2px); }
            .texto-error { color: #dc3545; font-weight: bold; margin: 15px 0; }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>⚠️ Confirm Deletion</h1>
            <p>Are you sure you want to delete supplier <strong>{{ supplier.name }}</strong>?</p>
            {% if has_products %}
                <p class="texto-error">⚠️ This supplier has {{ products_count }} products associated. Cannot delete.</p>
                <a href="{% url 'vexora:list_suppliers' %}" class="btn-cancelar">Back</a>
            {% else %}
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn-eliminar">Yes, Delete</button>
                    <a href="{% url 'vexora:list_suppliers' %}" class="btn-cancelar">Cancel</a>
                </form>
            {% endif %}
        </div>
    </body>
    </html>
